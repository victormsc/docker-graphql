name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true  # Forzar a todas las actions a ejecutarse en Node.js 24

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: docker/login-action@v4
    - name: Docker login
      env:
        DOCKER_USER: ${{secrets.DOCKER_USER}}
        DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
      run: |
        echo "Iniciando login"
        docker login -u victorsanchezcorbacho -p $DOCKER_PASSWORD
        echo "Fin login"
